capabilities:
  file_upload: false
  image_generation: false
  sandbox: true
  websocket: false
context:
  inject_progress_log: true
  inject_task_history: true
  prompt_sections: []
hooks:
  module: ''
  post_task: ''
  pre_task: ''
limits:
  max_retries: 3
  max_subtask_depth: 2
  max_subtask_iterations: 3
  retry_delays:
  - 5
  - 15
  - 30
  task_timeout_seconds: 600
runner:
  class_name: ''
  module: ''
